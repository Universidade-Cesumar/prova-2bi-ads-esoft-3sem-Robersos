<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALMOXARIFADO ENF</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <H1>ALMOXARIFADO DE EMFERMAGEM</H1>
    </header>
    <main>
        <div id="cadastro">
            <p>ITEM</p>
            <input type="text" id="input-nome">
            <p>QUANTIDADE</p>
            <input type="text" id="input-quantidade">
            <button id="btn-cadastrar">CADASTRAR</button>
        </div>
        <div id="pesquisa">
            <p>PESQUISAR ITEM</p>
            <input type="text" id="input-busca" placeholder="Pesquisar item...">
            <p>Total de itens no almoxarifado: <span id="total-itens">0</span></p>
        </div>

        <div id="movimentacao" style="text-align: center; margin-bottom: 20px;">
            <p style="font-weight: bold; color: #555; margin-bottom: 5px;">QUANTIDADE PARA RETIRADA / APORTE</p>
            <input type="number" id="input-retirada" placeholder="Ex: 5"
                style="width: 120px; padding: 8px; text-align: center; border: 1px solid #ccc; border-radius: 4px;">
        </div>

        <ul id="lista-materiais">

        </ul>
    </main>
    <footer>
        <p>&copy; 2026 - Almoxarifado de Enfermagem | Todos os direitos reservados.</p>
    </footer>

    <script src="main.js"></script>
</body>

</html>
